<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Contact Us.</title>

    <!-- Bootstrap StyleSheet CDN-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
          crossorigin="anonymous">
</head>
<body>
    <div th:insert="~{fragments/header :: header}"></div>

    <div class="container py-5" style="width: 50%;">
        <div class="row">
            <div class="col-12 text-center">
                <h1>Welcome to the contact page.</h1>
            </div>
        </div>

        <br /><br />

        <!-- start of the row -->
        <div class="row">
            <!-- start of the six column -->
            <div class="col-6">
                <div class="row text-center">
                    <div class="col-12">
                        <h1><i class="fas fa-location-arrow text-secondary"></i></h1>
                    </div>
                </div>

                <div class="row text-center">
                    <div class="col-12">
                        <ul class="list-group">
                            <li class="list-group-item border-0">1000 Galvin Road South</li>
                            <li class="list-group-item border-0">Bellevue, NE 68005</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- start of the six column -->
            <div class="col-6">
                <div class="row text-center">
                    <div class="col-12">
                        <h1><i class="fas fa-phone text-secondary"></i></h1>
                    </div>
                </div>

                <div class="row text-center">
                    <div class="col-12">
                        <ul class="list-group">
                            <li class="list-group-item border-0">Direct: 555.555.5555</li>
                            <li class="list-group-item border-0">Toll-free: 1.800.555.5555</li>
                            <li class="list-group-item border-0">Fax: 555.555.5555</li>
                        </ul>
                    </div>
                </div>
            </div>
            <!-- end of the six column -->
        </div>
        <!-- end of the row -->
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/scriptFooter :: scriptFooter}"></div>
</body>
</html>
