<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Welcome</title>

    <!-- Bootstrap StyleSheet CDN-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
          crossorigin="anonymous">
</head>
<body>
    <div th:insert="~{fragments/header :: header}"></div>

    <main>
        <section class="py-5 text-center container">
            <div class="row py-lg-5">
                <div class="col-lg-6 col-md-8 mx-auto">
                    <h1 class="fw-light">Book Club</h1>
                    <p class="lead text-muted">
                        Welcome to the Book Club app, your "one-stop 
                        shop" for all your book club needs. Below you will find a list of
                        this months top 10 favorite books. Select the book to see its details.</p>
                </div>
            </div>

            <div class="col" th:each="book : ${books}">
                <p class="card-text">
                    <span th:text="${book.getTitle()}"></span>
                    <br />
                    <small class="text-muted"><em th:text="${book.getDescription()}"></em></small>
                </p>

                 <div class="btn-group">
                    <a href="#" th:href="@{/{id}(id=${book.getIsbn()})}" class="btn btn-sm btn-outline-secondary">View</a>
                </div>
            </div>

        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/scriptFooter :: scriptFooter}"></div>
</body>
</html>
