<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | Welcome</title>

    <!-- Bootstrap StyleSheet CDN-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
          crossorigin="anonymous">
</head>
<body>
    <div th:fragment="view">
        <div class="container mt-5">
            <h1 class="mb-4">Monthly Book Details</h1>
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title>" th:text="${book.getTitle()}">Book Title</h5>
                    <p class="card-text" th:text="${book.getIsbn()}">ISBN</p>
                    <p class="card-text" th:text="${book.getDescription()}">Book Description</p>
                    <strong class="card-text">Pages: </strong>
                    <p class="card-text" th:text="${book.getNumOfPages()}">Number of Pages</p>
                    <strong class="card-text">Authors: </strong>
                    <ul class="card-text" th:each="author : ${book.getAuthors()}">
                        <li class="card-text" th:text="${author}"></li>
                    </ul>
                </div>
            </div>
            <br />
            <a href="/" th:href="@{/}">Return to Books</a>
        </div>
    </div>
</body>
