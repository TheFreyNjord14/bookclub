<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookclub | New Monthly Book</title>

    <!-- Bootstrap StyleSheet CDN-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
          crossorigin="anonymous">
</head>
<body>
    <div class="container mt-5 text-center">
        <form action="#" th:action="@{/monthly-books}" th:object="${bookOfTheMonth}" method="post">
        <h1 class="mb-4">New Monthly Book Form</h1>
        <div class="mb-3 text-start">
            <label for="month" class="form-label">Months</label>
            <select name="month" id="month" class="form-select" th:field="*{month}">
                <option th:each="month : ${months.keySet()}" th:value="${month}" th:text="${months.get(month)}"></option>
            </select>
        </div>
        <div class="mb-3 text-start">
            <label for="isbn" class="form-label">ISBN</label>
            <input type="text" class="form-control" id="isbn" name="isbn" th:field="*{isbn}">
            <small th:if="${#fields.hasErrors('isbn')}" style="color: red;" th:errors="*{isbn}"></small>
        </div>
        <div class="mb-3 text-end">
            <button type="submit" class="btn btn-primary">Save</button>
        </div>
    </form>
    <div class="mb-3 text-start">
        <a href="/wishlist" th:href="@{/wishlist}">Return to Wishlist</a>
    </div>
    </div>
</body>
</html>
