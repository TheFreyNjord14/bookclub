<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Bookclub | Monthly Books</title>

        <!-- Bootstrap StyleSheet CDN-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
              crossorigin="anonymous">
    </head>
    <body>
        <div th:insert="~{fragments/header :: header}"></div>

        <div class="container mt-5">
            <h2 class="mb-4 text-center">Monthly Books</h2>

            <br />

            <p class="text-center">
                <a href="/monthly-books/new" th:href="@{/monthly-books/new}" class="btn btn-outline-secondary text-center">New Monthly Book</a>
            </p>

            <table class="table">
                <thead>
                    <tr>
                        <th>Month</th>
                        <th>ISBN</th>
                        <th>Functions</th>
                    </tr>
                </thead>
                <tbody th:each="book : ${bookOfTheMonth}">
                    <tr>
                        <td th:text="${book.getMonth()}"></td>
                        <td th:text="${book.getIsbn()}"></td>
                        <td>
                            <a href="#" th:href="@{/monthly-books/remove/{id}(id=${book.getId()})}">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
        <div th:replace="~{fragments/scriptFooter :: scriptFooter}"></div>
    </body>
</html>
