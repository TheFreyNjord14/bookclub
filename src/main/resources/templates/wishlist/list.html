<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Bookclub | Wishlist</title>

        <!-- Bootstrap StyleSheet CDN-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
              crossorigin="anonymous">
    </head>
    <body>
        <div th:insert="~{fragments/header :: header}"></div>

        <script>
            class HttpClient {
                async get (url, params = "") {
                    url = new URL(url);
                    url.search = new URLSearchParams(params).toString();

                    const res = await fetch(url.toString(), {
                        method: "GET",
                    });

                    return res.json();
                }
            }

            function buildTable (books) {
                let tableString = '<table class="table"><tr><th>Title</th><th>ISBN</th><th>Functions</th></tr>';
                
                for (let book of books) {
                    tableString += '<tr><td>' + book.title + '</td><td>' + book.isbn + '</td><td style="display: inline-block; white-space: nowrap;"><a href="/wishlist/edit">Edit</a> | <a href="/wishlist/delete">Delete</a></td></tr>';
                }

                tableString += '</table>';

                return tableString;
            }

            const http = new HttpClient();

            http.get("http://localhost:8080/api/wishlist").then(res => {
                document.getElementById("wishlist").innerHTML = buildTable(res);
            }).catch(e => {
                console.log(e);
            });
        </script>

        <div class="container mt-5">
            <h2 class="mb-4 text-center">My Wishlist</h2>

            <br />

            <p class="text-center">
                <a href="/wishlist/new" th:href="@{/wishlist/new}" class="btn btn-outline-secondary text-center">New Wishlist Item</a>
            </p>

            <div id="wishlist"></div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
        <div th:replace="~{fragments/scriptFooter :: scriptFooter}"></div>
    </body>
</html>
