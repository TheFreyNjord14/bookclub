<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Bookclub | Wishlist</title>

        <!-- Bootstrap StyleSheet CDN-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
              crossorigin="anonymous">
    </head>
    <body>
        <div th:fragment="list">
            <div class="container mt-5 text-center">
                <h1 class="mb-4">My Wishlist</h1>
                <a href="/wishlist/new" th:href="@{/wishlist/new}" class="btn btn-outline-secondary text-center">New Wishlist Item</a>
                <table class="table text-start">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>ISBN</th>
                            <th>Functions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="wishlistItem : ${wishlist}">
                            <td th:text="${wishlistItem.getIsbn()}">ISBN</td>
                            <td th:text="${wishlistItem.getTitle()}">Book Title</td>
                            <td style="display: inline-block; white-space: nowrap;">
                                <a href="/wishlist/edit" th:href="@{/wishlist/edit}">Edit</a> |
                                <a href="/wishlist/delete" th:href="@{/wishlist/delete}">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </body>
</html>
